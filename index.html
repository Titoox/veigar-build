<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧙‍♂️ Veigar HQ — Star Zall Edition [Patch 26.7]</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #05050a; --bg-card: #0f0f1b; --purple: #a855f7; --purple-dark: #6b21a8;
  --gold: #fbbf24; --red: #ef4444; --green: #22c55e; --cyan: #22d3ee;
  --text: #f1f5f9; --border: #1e1e35; --font-display: 'Orbitron', sans-serif;
}
body { background: var(--bg-deep); color: var(--text); font-family: 'Rajdhani', sans-serif; margin: 0; padding: 20px; }
.app { max-width: 1200px; margin: 0 auto; }
header { text-align: center; border-bottom: 2px solid var(--purple); padding-bottom: 15px; margin-bottom: 25px; }
h1 { font-family: var(--font-display); font-size: 2rem; background: linear-gradient(to right, var(--purple), var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; }
.meta-tag { font-size: 0.75rem; color: var(--purple); font-weight: bold; letter-spacing: 2px; }

/* NAVIGATION */
nav { display: flex; gap: 8px; margin-bottom: 20px; background: var(--bg-card); padding: 5px; border-radius: 12px; }
.nav-btn { flex: 1; padding: 12px; border: none; background: transparent; color: #64748b; font-weight: 700; cursor: pointer; border-radius: 8px; transition: 0.3s; }
.nav-btn.active { background: var(--purple-dark); color: white; box-shadow: 0 0 10px rgba(168,85,247,0.3); }

/* CONTENT PANELS */
.panel { display: none; animation: slideUp 0.3s ease-out; }
.panel.active { display: block; }
@keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

/* CARDS */
.card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 15px; }
.card-header { font-family: var(--font-display); font-size: 0.8rem; color: var(--gold); border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 15px; display: flex; justify-content: space-between; }

/* DRAFT GRID */
.draft-slots { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 15px; }
.slot { background: #000; border: 2px dashed var(--border); border-radius: 12px; padding: 15px 5px; text-align: center; cursor: pointer; position: relative; }
.slot.active { border-color: var(--purple); }
.slot.filled { border-style: solid; border-color: var(--purple); background: #1e1b4b; }
.slot-label { font-size: 0.6rem; color: #94a3b8; display: block; margin-bottom: 5px; }
.slot-name { font-weight: bold; font-size: 0.9rem; }

/* POOL */
.pool { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; max-height: 250px; overflow-y: auto; background: #000; padding: 15px; border-radius: 12px; border: 1px solid var(--border); }
.p-btn { background: #1a1a2e; border: 1px solid var(--border); color: var(--text); padding: 8px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; transition: 0.2s; }
.p-btn:hover { background: var(--purple-dark); }
.search-in { width: 100%; padding: 12px; background: #000; border: 1px solid var(--border); color: var(--gold); border-radius: 8px; margin-bottom: 10px; font-family: 'JetBrains Mono'; }

/* BUILD RESULT */
.build-box { border-left: 4px solid var(--purple); padding-left: 15px; margin-bottom: 10px; }
.item-title { color: var(--gold); font-weight: bold; }
.item-reason { font-size: 0.85rem; color: #94a3b8; }

/* CALC */
.calc-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
.res-card { text-align: center; background: #000; padding: 15px; border-radius: 12px; border: 1px solid var(--purple); }
.res-val { font-family: var(--font-display); font-size: 1.8rem; color: var(--purple); }
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="meta-tag">VEIGAR OPT TOOL • SEASON 2026</div>
    <h1>TACTICAL DASHBOARD</h1>
  </header>

  <nav>
    <button class="nav-btn active" onclick="tab('draft')">🎯 ANALYSE DRAFT</button>
    <button class="nav-btn" onclick="tab('matchup')">⚔️ MATCHUPS</button>
    <button class="nav-btn" onclick="tab('calc')">🧮 CALCULATEUR</button>
  </nav>

  <section id="p-draft" class="panel active">
    <div class="card">
      <div class="card-header"><span>COMPOSITION ENNEMIE</span> <span id="counter-stats" style="color:var(--cyan)"></span></div>
      <div class="draft-slots">
        <div class="slot active" id="s-mid" onclick="selSlot('mid')"><span class="slot-label">MID (FACE)</span><span id="t-mid" class="slot-name">+</span></div>
        <div class="slot" id="s-top" onclick="selSlot('top')"><span class="slot-label">TOP</span><span id="t-top" class="slot-name">+</span></div>
        <div class="slot" id="s-jgl" onclick="selSlot('jgl')"><span class="slot-label">JUNGLE</span><span id="t-jgl" class="slot-name">+</span></div>
        <div class="slot" id="s-adc" onclick="selSlot('adc')"><span class="slot-label">ADC</span><span id="t-adc" class="slot-name">+</span></div>
        <div class="slot" id="s-sup" onclick="selSlot('sup')"><span class="slot-label">SUPPORT</span><span id="t-sup" class="slot-name">+</span></div>
      </div>
      <input type="text" id="pSearch" class="search-in" placeholder="🔍 Taper le nom d'un champion..." oninput="drawPool()">
      <div class="pool" id="p-list"></div>
    </div>
    <div id="build-res"></div>
  </section>

  <section id="p-matchup" class="panel">
    <div class="card">
      <div class="card-header">FICHES DE COMBAT (MAJ 2026.7)</div>
      <div id="m-list" class="pool" style="max-height: 400px;"></div>
    </div>
    <div id="m-detail"></div>
  </section>

  <section id="p-calc" class="panel">
    <div class="card">
      <div class="card-header">ESTIMATEUR DE DÉGÂTS (Z + R)</div>
      <div class="calc-row">
        <div><label>Stacks Passif</label><input type="number" id="v-st" class="search-in" value="180" oninput="recalc()"></div>
        <div><label>AP Items</label><input type="number" id="v-it" class="search-in" value="400" oninput="recalc()"></div>
      </div>
      <div class="calc-row">
        <div class="res-card"><div class="res-val" id="r-ap">0</div><div>AP TOTALE</div></div>
        <div class="res-card"><div class="res-val" id="r-dmg" style="color:var(--red)">0</div><div>ONE-SHOT CAP</div></div>
      </div>
    </div>
  </section>
</div>

<script>
/* DATABASE MARS 2026 */
const DATA = {
  "Zaahen": {role:"top", dmg:"ad", mob:true, tank:true, tip:"Respecte son E au niveau 3. Cage-toi s'il dash."},
  "Yunara": {role:"adc", dmg:"ad", mob:true, tank:false, tip:"Ses projectiles ricochent. Ne reste pas près des sbires."},
  "Mel": {role:"mid", dmg:"ap", mob:false, tank:false, tip:"Garde ta cage pour quand elle canalise son rayon."},
  "Ambessa": {role:"top", dmg:"ad", mob:true, tank:true, tip:"Joue Fimbulwinter. Elle va te dive sans cesse."},
  "Aurora": {role:"mid", dmg:"ap", mob:true, tank:false, tip:"Elle peut sauter ta cage. Attends son atterrissage."},
  "Smolder": {role:"mid", dmg:"mixed", mob:true, tank:false, tip:"Punis son early. Tu outscales ses dégâts de zone."},
  "Hwei": {role:"mid", dmg:"ap", mob:false, tank:false, tip:"Matchup de skill. Cage-le quand il prépare son livre."},
  "Yone": {role:"mid", dmg:"mixed", mob:true, tank:false, tip:"Cage son point de retour (E). Bone Plating requis."},
  "Yasuo": {role:"mid", dmg:"ad", mob:true, tank:false, tip:"Ton Z traverse son mur s'il est au milieu."},
  "Sylas": {role:"mid", dmg:"ap", mob:true, tank:true, tip:"Rush Banshee. S'il te vole ton R, tu es mort."},
  "K'Sante": {role:"top", dmg:"mixed", mob:true, tank:true, tip:"Stacke sur lui gratuitement. Il ne peut pas te tuer solo."},
  "Briar": {role:"jgl", dmg:"ad", mob:true, tank:true, tip:"Cage sur sa trajectoire de frénésie. Elle ne peut pas dévier."},
  "Naafiri": {role:"mid", dmg:"ad", mob:true, tank:false, tip:"Ses chiens bloquent ton A. Utilise le Z en zone."},
  "Viktor": {role:"mid", dmg:"ap", mob:false, tank:false, tip:"Post-rework 2026 : son E est plus rapide. Dodge latéralement."},
  "Zeri": {role:"adc", dmg:"ad", mob:true, tank:false, tip:"Elle va essayer de flank par les murs. Cage le bord du mur."},
  "Bel'Veth": {role:"jgl", dmg:"ad", mob:true, tank:true, tip:"Ne l'affronte pas dans la rivière. Cage ses 4 dashes."},
  "Vex": {role:"mid", dmg:"ap", mob:false, tank:false, tip:"Banshee bloque son R. Si elle ne peut pas dash in, elle meurt."}
};

let draft = {mid:null, top:null, jgl:null, adc:null, sup:null}, cur = 'mid';

function tab(id) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('p-'+id).classList.add('active');
  event.target.classList.add('active');
}

function selSlot(s) {
  cur = s;
  document.querySelectorAll('.slot').forEach(el => el.classList.remove('active'));
  document.getElementById('s-'+s).classList.add('active');
}

function drawPool() {
  const list = document.getElementById('p-list');
  const search = document.getElementById('pSearch').value.toLowerCase();
  list.innerHTML = '';
  Object.keys(DATA).forEach(name => {
    if(name.toLowerCase().includes(search)) {
      let b = document.createElement('button'); b.className = 'p-btn'; b.textContent = name;
      b.onclick = () => {
        draft[cur] = name; document.getElementById('t-'+cur).textContent = name;
        document.getElementById('s-'+cur).classList.add('filled');
        genBuild();
      };
      list.appendChild(b);
    }
  });
}

function genBuild() {
  let mob = 0, ad = 0, tank = 0;
  Object.values(draft).filter(Boolean).forEach(c => {
    if(DATA[c].mob) mob++; if(DATA[c].dmg==='ad') ad++; if(DATA[c].tank) tank++;
  });
  
  const res = document.getElementById('build-res');
  let build = [
    {n:"Rod of Ages", r:"HP/Mana vital en 2026. Scale avec ton passif."},
    {n:"Seraph's Embrace", r:"Bouclier indispensable vs burst."}
  ];
  if(mob >= 2) build.push({n:"Fimbulwinter", r:"Option Star Zall vs Mobiles : double shield avec la cage."});
  if(ad >= 3) build.push({n:"Frozen Heart", r:"Armure + Réduction AS ennemie."});
  if(tank >= 1) build.push({n:"Cryptbloom", r:"Pen + Heal de zone sur kill."});
  build.push({n:"Rabadon's Deathcap", r:"Multiplicateur x1.35 AP."});

  let h = `<div class="card"><div class="card-header">BUILD RECOMMANDÉ (VS DRAFT)</div>`;
  build.forEach(i => h += `<div class="build-box"><div class="item-title">${i.n}</div><div class="item-reason">${i.r}</div></div>`);
  res.innerHTML = h + `</div>`;
  document.getElementById('counter-stats').textContent = `${ad} AD | ${mob} MOB | ${tank} TNK`;
}

function drawMatchups() {
  const m = document.getElementById('m-list'); m.innerHTML = '';
  Object.keys(DATA).forEach(name => {
    let b = document.createElement('button'); b.className = 'p-btn'; b.textContent = name;
    b.onclick = () => {
      document.getElementById('m-detail').innerHTML = `<div class="card"><div class="card-header">CONSEIL VS ${name}</div><p>${DATA[name].tip}</p></div>`;
    };
    m.appendChild(b);
  });
}

function recalc() {
  const s = parseInt(document.getElementById('v-st').value)||0, i = parseInt(document.getElementById('v-it').value)||0;
  const ap = Math.floor((s + i) * 1.35);
  document.getElementById('r-ap').textContent = ap;
  // Formule simplifiée R execute patch 26.7
  const dmg = Math.floor((320 + (ap * 1.1)) + (650 + (ap * 1.6)));
  document.getElementById('r-dmg').textContent = dmg;
}

drawPool(); drawMatchups(); recalc();
</script>
</body>
</html>
