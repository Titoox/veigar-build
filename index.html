<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>🧙‍♂️ VEIGAR HQ - 170+ Champions Edition [2026]</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #050508; --card: #0d0d1a; --purple: #a855f7; --gold: #fbbf24;
    --red: #ff4d4d; --blue: #4d94ff; --border: #1f1f3d;
}
body { background: var(--bg); color: #e2e8f0; font-family: 'Rajdhani', sans-serif; margin: 0; padding: 15px; }
.container { max-width: 1200px; margin: 0 auto; }
header { text-align: center; border-bottom: 2px solid var(--purple); padding: 10px 0; margin-bottom: 20px; }
h1 { font-family: 'Orbitron'; background: linear-gradient(45deg, var(--purple), var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; text-transform: uppercase; }

/* DRAFT SYSTEM */
.draft-bar { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 20px; }
.slot { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 10px; text-align: center; cursor: pointer; transition: 0.2s; }
.slot.active { border-color: var(--purple); box-shadow: 0 0 10px var(--purple); }
.slot.filled { background: #1a1a3a; border-color: var(--gold); }
.label { display: block; font-size: 0.7rem; color: #94a3b8; margin-bottom: 4px; }

/* CHAMPION SELECTOR */
.search-box { width: 100%; padding: 12px; background: #000; border: 1px solid var(--border); color: var(--gold); border-radius: 8px; margin-bottom: 10px; font-size: 1rem; }
.pool { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 5px; max-height: 200px; overflow-y: auto; background: #000; padding: 10px; border-radius: 10px; }
.p-btn { background: #16162d; border: 1px solid var(--border); color: #fff; padding: 8px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
.p-btn:hover { background: var(--purple); }

/* ANALYSIS DISPLAY */
.res-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
.build-card { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 15px; border-left: 5px solid var(--purple); }
.item-row { margin-bottom: 10px; padding-bottom: 5px; border-bottom: 1px solid #1a1a3a; }
.item-name { font-weight: bold; color: var(--gold); }
.item-why { font-size: 0.85rem; color: #94a3b8; }

.badge { padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; margin-right: 5px; text-transform: uppercase; }
.b-ad { background: #5a2e17; color: #ff8c4d; }
.b-ap { background: #172e5a; color: #4d94ff; }
.b-mob { background: #3a175a; color: #d94dff; }
</style>
</head>
<body>

<div class="container">
    <header>
        <h1>VEIGAR TACTICAL GRIMOIRE</h1>
        <div style="font-size: 0.8rem; letter-spacing: 2px; color: var(--purple);">PATCH 26.10 - COMPATIBLE 170+ CHAMPIONS</div>
    </header>

    <div class="draft-bar">
        <div class="slot active" onclick="setSlot('mid')"><span class="label">MID (FACE)</span><b id="t-mid">+</b></div>
        <div class="slot" onclick="setSlot('top')"><span class="label">TOP</span><b id="t-top">+</b></div>
        <div class="slot" onclick="setSlot('jgl')"><span class="label">JUNGLE</span><b id="t-jgl">+</b></div>
        <div class="slot" onclick="setSlot('adc')"><span class="label">ADC</span><b id="t-adc">+</b></div>
        <div class="slot" onclick="setSlot('sup')"><span class="label">SUPPORT</span><b id="t-sup">+</b></div>
    </div>

    <input type="text" id="cSearch" class="search-box" placeholder="🔍 Taper un nom (ex: Zaahen, Yunara, Yasuo...)" oninput="filterPool()">
    <div class="pool" id="cPool"></div>

    <div class="res-grid" id="resGrid" style="display:none;">
        <div class="build-card">
            <h3 style="margin-top:0; color:var(--purple);">🛠 BUILD ADAPTATIF</h3>
            <div id="buildList"></div>
        </div>
        <div class="build-card" style="border-left-color: var(--gold);">
            <h3 style="margin-top:0; color:var(--gold);">💡 CONSEILS CHALLENGER</h3>
            <div id="tipList"></div>
        </div>
    </div>
</div>

<script>
// LA LISTE ROYALE 2026
const CHAMPIONS = ["Aatrox","Ahri","Akali","Akshan","Alistar","Ambessa","Amumu","Anivia","Annie","Aphelios","Ashe","Aurelion Sol","Aurora","Azir","Bard","Bel'Veth","Blitzcrank","Brand","Braum","Briar","Caitlyn","Camille","Cassiopeia","Cho'Gath","Corki","Darius","Diana","Dr. Mundo","Draven","Ekko","Elise","Evelynn","Ezreal","Fiddlesticks","Fiora","Fizz","Galio","Gangplank","Garen","Gnar","Gragas","Graves","Gwen","Hecarim","Heimerdinger","Hwei","Illaoi","Irelia","Ivern","Janna","Jarvan IV","Jax","Jayce","Jhin","Jinx","K'Santé","Kai'Sa","Kalista","Karma","Karthus","Kassadin","Katarina","Kayle","Kayn","Kennen","Kha'Zix","Kindred","Kled","Kog'Maw","LeBlanc","Lee Sin","Leona","Lillia","Lissandra","Lucian","Lulu","Lux","Malphite","Malzahar","Maokai","Maître Yi","Mel","Milio","Miss Fortune","Mordekaiser","Morgana","Naafiri","Nami","Nasus","Nautilus","Neeko","Nidalee","Nilah","Nocturne","Nunu et Willump","Olaf","Orianna","Ornn","Pantheon","Poppy","Pyke","Qiyana","Quinn","Rakan","Rammus","Rek'Sai","Rell","Renata Glasc","Renekton","Rengar","Riven","Rumble","Ryze","Samira","Sejuani","Senna","Sett","Shaco","Shen","Shyvana","Singed","Sion","Sivir","Skarner","Smolder","Sona","Soraka","Swain","Sylas","Syndra","Séraphine","Tahm Kench","Taliyah","Talon","Taric","Teemo","Thresh","Tristana","Trundle","Tryndamere","Twisted Fate","Twitch","Udyr","Urgot","Varus","Vayne","Veigar","Vel'Koz","Vex","Vi","Viego","Viktor","Vladimir","Volibear","Warwick","Wukong","Xayah","Xerath","Xin Zhao","Yasuo","Yone","Yorick","Yunara","Yuumi","Zaahen","Zac","Zed","Zeri","Ziggs","Zilean","Zoé","Zyra"];

// LOGIQUE DE THÉORYCRAFTING
const META = {
    assassins: ["Zed","Talon","Katarina","Fizz","Akali","Qiyana","LeBlanc","Naafiri","Pyke","Yone","Diana","Evelynn","Aurora","Kha'Zix"],
    tanks: ["K'Santé","Malphite","Ornn","Sion","Dr. Mundo","Cho'Gath","Skarner","Zaahen","Maokai","Alistar","Braum","Nautilus"],
    mobiles: ["Yasuo","Yone","Ambessa","Lee Sin","Lucian","Ezreal","Zeri","Bel'Veth","Kalista","Kayn","Master Yi","Yunara","Zaahen"]
};

let selected = {mid:null, top:null, jgl:null, adc:null, sup:null}, activeSlot = 'mid';

function setSlot(s) {
    activeSlot = s;
    document.querySelectorAll('.slot').forEach(el => el.classList.remove('active'));
    event.currentTarget.classList.add('active');
}

function filterPool() {
    const q = document.getElementById('cSearch').value.toLowerCase();
    const pool = document.getElementById('cPool');
    pool.innerHTML = '';
    CHAMPIONS.forEach(name => {
        if(name.toLowerCase().includes(q)) {
            let b = document.createElement('button'); b.className = 'p-btn'; b.textContent = name;
            b.onclick = () => selectChamp(name);
            pool.appendChild(b);
        }
    });
}

function selectChamp(name) {
    selected[activeSlot] = name;
    document.getElementById('t-'+activeSlot).textContent = name;
    document.getElementById('t-'+activeSlot).parentElement.classList.add('filled');
    analyze();
}

function analyze() {
    document.getElementById('resGrid').style.display = 'grid';
    let build = [], tips = [];
    let isMobile = 0, isAD = 0, isTank = 0;

    Object.values(selected).filter(Boolean).forEach(c => {
        if(META.mobiles.includes(c)) isMobile++;
        if(META.tanks.includes(c)) isTank++;
    });

    // BUILD LOGIC
    build.push({n:"Bâton Séculaire (RoA)", w:"Sustain HP/Mana obligatoire pour survivre aux échanges en 2026."});
    if(isMobile >= 2) build.push({n:"Fimbulwinter", w:"Beaucoup de dashes en face. Le shield sur ta cage (E) te sauvera."});
    else build.push({n:"Étreinte du Séraphin", w:"Plus d'AP et bouclier anti-burst standard."});
    
    if(isTank >= 1) build.push({n:"Fleur de Crypte (Cryptbloom)", w:"Pénétration magique + soin de zone sur kill."});
    if(selected.mid && META.assassins.includes(selected.mid)) build.push({n:"Sablier de Zhonya", w:"Contre l'all-in de "+selected.mid});
    
    build.push({n:"Coiffe de Rabadon", w:"Multiplicateur final pour le One-Shot."});

    // RENDER
    document.getElementById('buildList').innerHTML = build.map(i => `<div class="item-row"><div class="item-name">${i.n}</div><div class="item-why">${i.w}</div></div>`).join('');
    
    // TIPS LOGIC
    let t = [];
    if(selected.mid === "Yasuo") t.push("Z traverse son mur. Cage-le quand il n'a plus de sbires pour dash.");
    if(selected.mid === "Zaahen") t.push("NOUVEAU COLOSSE : Ne lance pas tes sorts de loin, il gagne de la MS. Cage-le au corps à corps.");
    if(isMobile >= 3) t.push("Garde ta CAGE (E) uniquement pour la défense. Ne l'utilise pas pour initier.");
    if(isTank >= 2) t.push("Ne focus pas les tanks avec ton R. Garde-le pour exécuter les carrys à < 40% PV.");
    
    document.getElementById('tipList').innerHTML = t.map(i => `<p style="font-size:0.9rem; margin-bottom:8px;">• ${i}</p>`).join('') || "Sélectionne plus de champions pour des conseils précis.";
}

filterPool();
</script>
</body>
</html>
