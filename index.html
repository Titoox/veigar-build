<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tactical Dashboard — Veigar & Syndra</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --accent: #a855f7;
  --accent-dim: rgba(168,85,247,0.15);
  --accent-glow: rgba(168,85,247,0.4);
  --bg: #0a0a14;
  --card: #12121f;
  --card2: #16162a;
  --border: #1e1e35;
  --border2: #2a2a45;
  --gold: #fbbf24;
  --red: #ef4444;
  --orange: #f97316;
  --green: #22c55e;
  --cyan: #22d3ee;
  --text: #e2e2f0;
  --text-dim: #6b6b9a;
  --text-mid: #a0a0cc;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Rajdhani',sans-serif;
  font-size:16px;
  min-height:100vh;
  overflow-x:hidden;
}
body::before{
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 10%, rgba(168,85,247,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 50% 30% at 80% 90%, rgba(99,102,241,0.05) 0%, transparent 60%);
  pointer-events:none;
  z-index:0;
}
/* ---- CHAMPION SELECTOR ---- */
#champion-selector{
  position:relative;z-index:10;
  display:flex;gap:16px;align-items:center;justify-content:center;
  padding:24px 20px 0;
}
.champ-btn{
  display:flex;align-items:center;gap:12px;
  background:var(--card);border:2px solid var(--border2);
  border-radius:12px;padding:12px 24px;cursor:pointer;
  transition:all .25s ease;font-family:'Orbitron',sans-serif;
  font-size:14px;font-weight:700;letter-spacing:1px;
  text-transform:uppercase;color:var(--text-mid);
}
.champ-btn img{width:48px;height:48px;border-radius:8px;object-fit:cover}
.champ-btn:hover{border-color:var(--accent);color:var(--text)}
.champ-btn.active{
  border-color:var(--accent);color:var(--accent);
  box-shadow:0 0 20px var(--accent-glow),inset 0 0 20px var(--accent-dim);
}
/* ---- TABS ---- */
#tabs{
  position:relative;z-index:10;
  display:flex;gap:4px;padding:20px 20px 0;
  overflow-x:auto;scrollbar-width:none;
}
#tabs::-webkit-scrollbar{display:none}
.tab-btn{
  flex-shrink:0;background:transparent;border:1px solid var(--border);
  border-radius:8px 8px 0 0;padding:10px 18px;cursor:pointer;
  font-family:'Rajdhani',sans-serif;font-weight:600;font-size:14px;
  color:var(--text-dim);transition:all .2s ease;white-space:nowrap;
}
.tab-btn:hover{color:var(--text);border-color:var(--border2)}
.tab-btn.active{
  background:var(--card);border-color:var(--accent);
  border-bottom:1px solid var(--card);color:var(--accent);
  box-shadow:0 0 10px var(--accent-glow);
}
/* ---- MAIN CONTENT ---- */
#content{
  position:relative;z-index:10;
  background:var(--card);border:1px solid var(--border);
  border-radius:0 12px 12px 12px;margin:0 20px 20px;
  padding:24px;min-height:500px;
}
.tab-panel{display:none}
.tab-panel.active{display:block}
/* ---- CARDS ---- */
.card{
  background:var(--card2);border:1px solid var(--border);
  border-radius:14px;padding:20px;
  transition:border-color .2s,box-shadow .2s;
}
.card:hover{border-color:var(--accent);box-shadow:0 0 16px var(--accent-dim)}
.card-title{
  font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;color:var(--accent);
  margin-bottom:14px;
}
/* ---- GRID UTILS ---- */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.flex{display:flex}
.flex-col{flex-direction:column}
.gap-8{gap:8px}
.gap-12{gap:12px}
.gap-16{gap:16px}
.mt-16{margin-top:16px}
.mt-12{margin-top:12px}
/* ---- ITEM CHIP ---- */
.item-chip{
  display:flex;align-items:center;gap:8px;
  background:rgba(255,255,255,0.03);border:1px solid var(--border);
  border-radius:8px;padding:6px 10px;
  font-size:13px;font-weight:500;
}
.item-chip img{width:28px;height:28px;border-radius:4px;flex-shrink:0}
.item-chip-name{color:var(--text-mid);font-size:12px}
/* ---- RUNE ICON ---- */
.rune-icon{
  position:relative;cursor:pointer;
  width:48px;height:48px;border-radius:50%;
  border:2px solid transparent;
  transition:all .2s;
}
.rune-icon.active{
  border-color:var(--accent);
  filter:brightness(1.1);
  box-shadow:0 0 12px var(--accent-glow);
}
.rune-icon.inactive{opacity:.25;filter:grayscale(1)}
.rune-icon img{width:100%;height:100%;border-radius:50%;object-fit:cover}
.rune-icon .tooltip{
  position:absolute;bottom:110%;left:50%;transform:translateX(-50%);
  background:#1a1a30;border:1px solid var(--accent);
  border-radius:8px;padding:8px 12px;white-space:nowrap;
  font-size:12px;pointer-events:none;opacity:0;
  transition:opacity .2s;z-index:100;min-width:160px;white-space:normal;
  max-width:220px;text-align:center;
}
.rune-icon:hover .tooltip{opacity:1}
.tooltip-name{font-weight:700;color:var(--accent);margin-bottom:4px;display:block}
.tooltip-desc{color:var(--text-mid);font-size:11px;line-height:1.4}
/* ---- FLASHCARD ---- */
.flashcard{
  display:flex;align-items:flex-start;gap:12px;
  background:rgba(255,255,255,0.02);border:1px solid var(--border);
  border-radius:10px;padding:12px;margin-top:8px;
}
.flashcard-badge{
  flex-shrink:0;width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;
}
.badge-purple{background:rgba(168,85,247,0.2);border:1px solid var(--accent);color:var(--accent)}
.badge-gold{background:rgba(251,191,36,0.2);border:1px solid var(--gold);color:var(--gold)}
.badge-green{background:rgba(34,197,94,0.2);border:1px solid var(--green);color:var(--green)}
.badge-red{background:rgba(239,68,68,0.2);border:1px solid var(--red);color:var(--red)}
.badge-cyan{background:rgba(34,211,238,0.2);border:1px solid var(--cyan);color:var(--cyan)}
.flashcard-text{font-size:13px;color:var(--text-mid);line-height:1.5}
.flashcard-text strong{color:var(--text);font-weight:600}
/* ---- THREAT BAR ---- */
.threat-row{
  display:flex;align-items:center;gap:12px;
  padding:12px 0;border-bottom:1px solid var(--border);
}
.threat-row:last-child{border-bottom:none}
.threat-row img{width:40px;height:40px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0}
.threat-name{font-weight:600;font-size:14px;min-width:90px}
.threat-bar-wrap{flex:1;height:6px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden}
.threat-fill{height:100%;border-radius:3px;transition:width .6s ease}
.threat-fill.extreme{background:linear-gradient(90deg,#ef4444,#b91c1c)}
.threat-fill.hard{background:linear-gradient(90deg,#f97316,#ea580c)}
.threat-fill.even{background:linear-gradient(90deg,#eab308,#ca8a04)}
.threat-fill.easy{background:linear-gradient(90deg,#22c55e,#16a34a)}
.threat-badge{
  padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;
  font-family:'JetBrains Mono',monospace;flex-shrink:0;
}
.badge-extreme{background:rgba(239,68,68,0.2);color:#ef4444;border:1px solid #ef4444}
.badge-hard{background:rgba(249,115,22,0.2);color:#f97316;border:1px solid #f97316}
.badge-even{background:rgba(234,179,8,0.2);color:#eab308;border:1px solid #eab308}
.badge-easy{background:rgba(34,197,94,0.2);color:#22c55e;border:1px solid #22c55e}
/* ---- BUILD ORDER ---- */
.build-order-item{
  display:flex;align-items:flex-start;gap:12px;
  background:rgba(255,255,255,0.02);border:1px solid var(--border);
  border-radius:10px;padding:12px;margin-bottom:8px;
}
.build-num{
  flex-shrink:0;width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px;
  border:2px solid var(--accent);color:var(--accent);
  background:var(--accent-dim);
}
.build-item-img{width:36px;height:36px;border-radius:6px;flex-shrink:0}
.build-item-info{flex:1}
.build-item-name{font-weight:600;font-size:14px;color:var(--text)}
.build-item-reason{font-size:12px;color:var(--text-dim);margin-top:2px;line-height:1.4}
.build-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.build-tag{
  padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;
  background:rgba(168,85,247,0.12);border:1px solid rgba(168,85,247,0.3);
  color:var(--accent);font-family:'JetBrains Mono',monospace;
}
/* ---- COMBO DISPLAY ---- */
.combo-card{
  background:var(--card2);border:1px solid var(--border);
  border-radius:12px;padding:16px;margin-bottom:12px;
}
.combo-name{
  font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:1.5px;color:var(--gold);margin-bottom:6px;text-transform:uppercase;
}
.combo-when{font-size:12px;color:var(--text-dim);margin-bottom:10px;line-height:1.4}
.combo-seq{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.spell-icon{
  width:36px;height:36px;border-radius:8px;
  border:2px solid var(--border2);object-fit:cover;
  background:#1a1a30;
}
.spell-letter{
  display:inline-flex;align-items:center;justify-content:center;
  width:20px;height:20px;border-radius:50%;
  background:var(--accent-dim);border:1px solid var(--accent);
  font-size:10px;font-weight:700;color:var(--accent);
  font-family:'JetBrains Mono',monospace;
}
.combo-arrow{color:var(--text-dim);font-size:14px;font-weight:700}
/* ---- CALCULATOR ---- */
.calc-input{
  background:rgba(255,255,255,0.04);border:1px solid var(--border2);
  border-radius:8px;padding:10px 14px;width:100%;
  color:var(--text);font-family:'JetBrains Mono',monospace;font-size:14px;
  outline:none;transition:border-color .2s;
}
.calc-input:focus{border-color:var(--accent)}
.calc-label{font-size:13px;color:var(--text-mid);margin-bottom:6px;display:block;font-weight:500}
.calc-result-row{
  display:flex;align-items:center;gap:10px;
  padding:10px 0;border-bottom:1px solid var(--border);
}
.calc-result-row:last-child{border-bottom:none}
.calc-dmg{
  font-family:'JetBrains Mono',monospace;font-size:16px;
  font-weight:700;color:var(--gold);margin-left:auto;
}
.calc-label-sm{font-size:13px;color:var(--text-mid)}
/* ---- DRAFT ANALYZER ---- */
.slot-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px}
.draft-slot{
  background:var(--card2);border:2px solid var(--border);
  border-radius:10px;padding:10px;text-align:center;cursor:pointer;
  transition:all .2s;min-height:90px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:4px;
}
.draft-slot:hover{border-color:var(--accent-glow)}
.draft-slot.filled{border-color:var(--accent)}
.draft-slot.mid-slot{border-color:rgba(239,68,68,0.4)}
.draft-slot.mid-slot.filled{border-color:#ef4444}
.draft-slot img{width:44px;height:44px;border-radius:50%;border:2px solid var(--border2)}
.draft-slot-label{font-size:10px;color:var(--text-dim);font-weight:600;text-transform:uppercase;letter-spacing:1px}
.draft-slot-name{font-size:12px;font-weight:600;color:var(--text);margin-top:2px}
/* ---- CHAMPION POOL ---- */
.pool-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:1000;
  display:flex;align-items:center;justify-content:center;
}
.pool-modal{
  background:var(--card);border:1px solid var(--border2);
  border-radius:16px;padding:20px;width:90%;max-width:600px;max-height:80vh;
  display:flex;flex-direction:column;gap:12px;
}
.pool-search{
  background:rgba(255,255,255,0.04);border:1px solid var(--border2);
  border-radius:8px;padding:10px 14px;width:100%;
  color:var(--text);font-family:'Rajdhani',sans-serif;font-size:15px;
  outline:none;
}
.pool-search:focus{border-color:var(--accent)}
.pool-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(70px,1fr));
  gap:8px;overflow-y:auto;max-height:400px;padding-right:4px;
}
.pool-grid::-webkit-scrollbar{width:4px}
.pool-grid::-webkit-scrollbar-track{background:transparent}
.pool-grid::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.pool-champ{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  background:rgba(255,255,255,0.03);border:1px solid var(--border);
  border-radius:8px;padding:8px 4px;cursor:pointer;transition:all .15s;
  text-align:center;
}
.pool-champ:hover{border-color:var(--accent);background:var(--accent-dim)}
.pool-champ img{width:44px;height:44px;border-radius:50%;object-fit:cover}
.pool-champ-name{font-size:10px;color:var(--text-mid);line-height:1.2;font-weight:500}
/* ---- MATCHUP GRID ---- */
.matchup-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
.matchup-card{
  background:var(--card2);border:1px solid var(--border);
  border-radius:10px;padding:10px;cursor:pointer;
  text-align:center;transition:all .2s;
}
.matchup-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.matchup-card img{width:56px;height:56px;border-radius:50%;border:3px solid var(--border2);margin-bottom:6px}
.matchup-card-name{font-size:12px;font-weight:600;margin-bottom:4px}
/* ---- SECTION HEADINGS ---- */
.sec-title{
  font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;color:var(--text-mid);
  margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border);
}
/* ---- MISC ---- */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--accent-dim);border:1px solid var(--accent);
  border-radius:8px;padding:8px 18px;cursor:pointer;
  font-family:'Rajdhani',sans-serif;font-weight:600;font-size:14px;
  color:var(--accent);transition:all .2s;
}
.btn:hover{background:rgba(168,85,247,0.25);box-shadow:0 0 12px var(--accent-glow)}
.btn-red{background:rgba(239,68,68,0.12);border-color:#ef4444;color:#ef4444}
.btn-red:hover{background:rgba(239,68,68,0.25)}
.stat-chip{
  display:inline-flex;align-items:center;gap:6px;
  padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;
  font-family:'JetBrains Mono',monospace;
}
.stat-chip.ad{background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.3);color:#ef4444}
.stat-chip.ap{background:rgba(168,85,247,0.12);border:1px solid rgba(168,85,247,0.3);color:#a855f7}
.stat-chip.mobile{background:rgba(34,211,238,0.12);border:1px solid rgba(34,211,238,0.3);color:#22d3ee}
.stat-chip.tank{background:rgba(99,102,241,0.12);border:1px solid rgba(99,102,241,0.3);color:#818cf8}
.stat-chip.assassin{background:rgba(249,115,22,0.12);border:1px solid rgba(249,115,22,0.3);color:#f97316}
.stat-chip.mr{background:rgba(34,197,94,0.12);border:1px solid rgba(34,197,94,0.3);color:#22c55e}
/* ---- RESPONSIVE ---- */
@media(max-width:640px){
  .grid-2,.grid-3{grid-template-columns:1fr}
  .slot-grid{grid-template-columns:repeat(3,1fr)}
  .matchup-grid{grid-template-columns:repeat(auto-fill,minmax(100px,1fr))}
}
/* ---- RUNE TREE ---- */
.rune-tree{display:flex;flex-direction:column;gap:12px}
.rune-row{display:flex;gap:10px;align-items:center;justify-content:center}
.rune-tree-title{
  text-align:center;font-size:12px;font-weight:700;
  text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);margin-bottom:8px;
}
.rune-keystone .rune-icon{width:60px;height:60px}
/* ---- SITUATIONAL ITEM LIST ---- */
.sit-item{
  display:flex;align-items:center;gap:12px;
  padding:10px 0;border-bottom:1px solid var(--border);
}
.sit-item:last-child{border-bottom:none}
.sit-item img{width:36px;height:36px;border-radius:6px;flex-shrink:0}
.sit-item-name{font-weight:600;font-size:14px;color:var(--text);min-width:160px}
.sit-item-when{font-size:12px;color:var(--text-dim);flex:1}
/* ---- DRAFT RESULT ---- */
.draft-result{margin-top:20px}
.strat-card{
  background:rgba(168,85,247,0.05);border:1px solid rgba(168,85,247,0.2);
  border-radius:12px;padding:16px;
}
/* ---- FILTER BUTTONS ---- */
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.filter-btn{
  padding:6px 14px;border-radius:20px;cursor:pointer;
  font-size:12px;font-weight:600;font-family:'Rajdhani',sans-serif;
  background:rgba(255,255,255,0.04);border:1px solid var(--border2);
  color:var(--text-mid);transition:all .2s;
}
.filter-btn.active,.filter-btn:hover{
  border-color:var(--accent);color:var(--accent);background:var(--accent-dim);
}
</style>
</head>
<body>

<!-- CHAMPION SELECTOR -->
<div id="champion-selector">
  <button class="champ-btn active" onclick="selectChampion('Veigar')" id="btn-Veigar">
    <img id="img-veigar" src="" alt="Veigar" onerror="this.style.display='none'" loading="lazy">
    <span>Veigar</span>
  </button>
  <button class="champ-btn" onclick="selectChampion('Syndra')" id="btn-Syndra">
    <img id="img-syndra" src="" alt="Syndra" onerror="this.style.display='none'" loading="lazy">
    <span>Syndra</span>
  </button>
</div>

<!-- TABS -->
<div id="tabs">
  <button class="tab-btn active" onclick="switchTab('draft')">🎯 Draft Analyzer</button>
  <button class="tab-btn" onclick="switchTab('matchups')">⚔️ Matchups</button>
  <button class="tab-btn" onclick="switchTab('build')">🔮 Build</button>
  <button class="tab-btn" onclick="switchTab('runes')">💎 Runes</button>
  <button class="tab-btn" onclick="switchTab('calc')">🧮 Calculateur</button>
  <button class="tab-btn" onclick="switchTab('combos')">🎮 Combos</button>
</div>

<!-- CONTENT -->
<div id="content">
  <!-- DRAFT ANALYZER -->
  <div class="tab-panel active" id="panel-draft">
    <div class="slot-grid" id="draft-slots">
      <div class="draft-slot mid-slot" data-role="mid" onclick="openPool('mid')" id="slot-mid">
        <div class="draft-slot-label">MID 🎯</div>
        <div class="draft-slot-name" id="slot-mid-name">Cliquer</div>
      </div>
      <div class="draft-slot" data-role="top" onclick="openPool('top')" id="slot-top">
        <div class="draft-slot-label">TOP</div>
        <div class="draft-slot-name" id="slot-top-name">Cliquer</div>
      </div>
      <div class="draft-slot" data-role="jungle" onclick="openPool('jungle')" id="slot-jungle">
        <div class="draft-slot-label">JGL</div>
        <div class="draft-slot-name" id="slot-jungle-name">Cliquer</div>
      </div>
      <div class="draft-slot" data-role="adc" onclick="openPool('adc')" id="slot-adc">
        <div class="draft-slot-label">ADC</div>
        <div class="draft-slot-name" id="slot-adc-name">Cliquer</div>
      </div>
      <div class="draft-slot" data-role="support" onclick="openPool('support')" id="slot-support">
        <div class="draft-slot-label">SUP</div>
        <div class="draft-slot-name" id="slot-support-name">Cliquer</div>
      </div>
    </div>
    <button class="btn btn-red" onclick="resetDraft()">🔄 Reset Draft</button>
    <div class="draft-result" id="draft-result"></div>
  </div>

  <!-- MATCHUPS -->
  <div class="tab-panel" id="panel-matchups">
    <input type="text" id="matchup-search" placeholder="Rechercher un champion..." class="pool-search" style="margin-bottom:12px" oninput="filterMatchups()">
    <div class="filter-row" id="matchup-filters">
      <button class="filter-btn active" onclick="setMatchupFilter('all',this)">Tous</button>
      <button class="filter-btn" onclick="setMatchupFilter('extreme',this)">🔴 Extrême</button>
      <button class="filter-btn" onclick="setMatchupFilter('hard',this)">🟠 Difficile</button>
      <button class="filter-btn" onclick="setMatchupFilter('even',this)">🟡 Équilibré</button>

const CALC = {
  Veigar:{
    inputs:[
      {id:'stacks',label:'Stacks passif',min:0,max:1200,def:200,step:10},
      {id:'level',label:'Niveau',min:1,max:18,def:11,step:1},
      {id:'ap_items',label:'AP items (ex: 300)',min:0,max:800,def:300,step:10},
      {id:'rabadon',label:'Rabadon\'s ?',type:'checkbox',def:false},
      {id:'q_rank',label:'Rang Q (1-5)',min:1,max:5,def:5,step:1},
      {id:'r_rank',label:'Rang R (1-3)',min:1,max:3,def:3,step:1}
    ],
    calc(v){
      // Passive AP : stacks (no cap, stacks = raw AP bonus)
      const passiveAP = v.stacks;
      let totalAP = passiveAP + v.ap_items;
      if(v.rabadon) totalAP *= 1.35;
      const qBase=[80,120,160,200,240];
      const qRatio=[0.5,0.55,0.6,0.65,0.7];
      const wBase=[85,140,195,250,305];
      const wRatio=[0.7,0.8,0.9,1.0,1.1];
      const rMinBase=[175,250,325];
      const rMaxBase=[350,500,650];
      const rMinRatio=[0.65,0.7,0.75];
      const rMaxRatio=[1.3,1.4,1.5];
      const qr = v.q_rank-1, rr = v.r_rank-1;
      const Q = Math.round(qBase[qr] + qRatio[qr]*totalAP);
      const W = Math.round(wBase[4] + wRatio[4]*totalAP);
      const E = 70 + 0.3*totalAP;
      const Rmin = Math.round(rMinBase[rr] + rMinRatio[rr]*totalAP);
      const Rmax = Math.round(rMaxBase[rr] + rMaxRatio[rr]*totalAP);
      const combo = Q + W + Rmax;
      return {totalAP:Math.round(totalAP),Q,W,E:Math.round(E),Rmin,Rmax,combo};
    }
  },
  Syndra:{
    inputs:[
      {id:'level',label:'Niveau',min:1,max:18,def:11,step:1},
      {id:'ap_items',label:'AP items (ex: 300)',min:0,max:800,def:300,step:10},
      {id:'splinters',label:'Stacks Splinters (0-120)',min:0,max:120,def:80,step:5},
      {id:'spheres',label:'Nombre de sphères pour R (3-7)',min:3,max:7,def:5,step:1},
      {id:'q_rank',label:'Rang Q (1-5)',min:1,max:5,def:5,step:1},
      {id:'r_rank',label:'Rang R (1-3)',min:1,max:3,def:3,step:1}
    ],
    calc(v){
      let totalAP = v.ap_items;
      if(v.splinters >= 120) totalAP *= 1.15; // Transcendence +15% AP
      const qBase=[80,115,150,185,220];
      const qRatio=0.65;
      const rSphereBase=[80,120,160];
      const rSphereRatio=0.65;
      const qr = v.q_rank-1, rr = v.r_rank-1;
      const Q = Math.round(qBase[qr] + qRatio*totalAP);
      // W: 70/110/150/190/230 + 60% AP
      const W = Math.round(150 + 0.6*totalAP);
      // E: 70/110/150/190/230 + 60% AP (base)
      const E = Math.round(150 + 0.4*totalAP);
      const spheres = v.spheres;
      const R = Math.round((rSphereBase[rr] + rSphereRatio*totalAP) * spheres);
      const combo = Q + W + R;
      return {totalAP:Math.round(totalAP),Q,W,E,R,spheres,combo};
    }
  }
};

function init(){
  // Set champion images
  document.getElementById('img-veigar').src = champImg('Veigar');
  document.getElementById('img-syndra').src = champImg('Syndra');
  // Apply saved champ
  selectChampion(currentChamp, false);
  // Apply saved tab
  switchTab(activeTab, false);
  // Restore draft
  Object.entries(draft).forEach(([role, champ]) => {
    if(champ) updateSlot(role, champ);
  });
  renderDraftResult();
}

function saveState(){
  try{
    localStorage.setItem('tac_dashboard', JSON.stringify({
      champ: currentChamp, draft, tab: activeTab
    }));
  }catch(e){}
}

function selectChampion(name, doSave=true){
  currentChamp = name;
  document.querySelectorAll('.champ-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-'+name).classList.add('active');
  // Update accent color
  const accent = name==='Veigar' ? '#a855f7' : '#6366f1';
  const accentDim = name==='Veigar' ? 'rgba(168,85,247,0.15)' : 'rgba(99,102,241,0.15)';
  const accentGlow = name==='Veigar' ? 'rgba(168,85,247,0.4)' : 'rgba(99,102,241,0.4)';
  document.documentElement.style.setProperty('--accent', accent);
  document.documentElement.style.setProperty('--accent-dim', accentDim);
  document.documentElement.style.setProperty('--accent-glow', accentGlow);
  // Re-render active tab content
  renderTab(activeTab);
  renderDraftResult();
  if(doSave) saveState();
}

// ================================================================
//  TABS
// ================================================================
function switchTab(id, doSave=true){
  activeTab = id;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    const ids=['draft','matchups','build','runes','calc','combos'];
    b.classList.toggle('active', ids[i]===id);
  });
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
  renderTab(id);
  if(doSave) saveState();
}

function renderTab(id){
  if(id==='matchups') renderMatchups();
  if(id==='build') renderBuild();
  if(id==='runes') renderRunes();
  if(id==='calc') renderCalc();
  if(id==='combos') renderCombos();
}

function openPool(role){
  currentPoolRole = role;
  const overlay = document.getElementById('pool-overlay');
  overlay.style.display = 'flex';
  document.getElementById('pool-search-input').value = '';
  renderPoolGrid('');
}
function closePool(){ document.getElementById('pool-overlay').style.display='none'; }
function filterPool(){ renderPoolGrid(document.getElementById('pool-search-input').value.toLowerCase()); }

function renderPoolGrid(search){
  const role = currentPoolRole;
  let champs = CHAMP_DB.filter(c => {
    const nameMatch = c.n.toLowerCase().includes(search);
    if(search) return nameMatch;
    // Filter by role unless mid
    if(role==='mid') return c.roles.includes('mid');
    if(role==='top') return c.roles.includes('top');
    if(role==='jungle') return c.roles.includes('jungle');
    if(role==='adc') return c.roles.includes('adc');
    if(role==='support') return c.roles.includes('support');
    return true;
  }).sort((a,b)=>a.n.localeCompare(b.n));

  const grid = document.getElementById('pool-grid');
  grid.innerHTML = champs.map(c=>`
    <div class="pool-champ" onclick="selectChampForSlot('${c.n.replace(/'/g,"\\'")}')">
      <img src="${champImg(c.n)}" alt="${c.n}" onerror="this.style.display='none'" loading="lazy">
      <div class="pool-champ-name">${c.n}</div>
    </div>
  `).join('');
}

function selectChampForSlot(name){
  draft[currentPoolRole] = name;
  updateSlot(currentPoolRole, name);
  closePool();
  renderDraftResult();
  saveState();
}

function updateSlot(role, name){
  const slot = document.getElementById('slot-'+role);
  const nameEl = document.getElementById('slot-'+role+'-name');
  slot.classList.add('filled');
  // Remove old img if any
  const oldImg = slot.querySelector('img');
  if(oldImg) oldImg.remove();
  const img = document.createElement('img');
  img.src = champImg(name);
  img.alt = name;
  img.onerror = function(){ this.style.display='none'; };
  img.loading = 'lazy';
  slot.insertBefore(img, nameEl);
  nameEl.textContent = name;
}

function resetDraft(){
  draft = {mid:null,top:null,jungle:null,adc:null,support:null};
  ['mid','top','jungle','adc','support'].forEach(role=>{
    const slot = document.getElementById('slot-'+role);
    const nameEl = document.getElementById('slot-'+role+'-name');
    slot.classList.remove('filled');
    const img = slot.querySelector('img');
    if(img) img.remove();
    nameEl.textContent = 'Cliquer';
  });
  document.getElementById('draft-result').innerHTML = '';
  saveState();
}

function renderDraftResult(){
  const el = document.getElementById('draft-result');
  if(!draft.mid){ el.innerHTML=''; return; }
  const enemies = Object.values(draft).filter(Boolean);
  const enemy_champs = enemies.map(n => CHAMP_DB.find(c=>c.n===n)).filter(Boolean);
  const adCount = enemy_champs.filter(c=>c.dmg==='ad').length;
  const apCount = enemy_champs.filter(c=>c.dmg==='ap').length;
  const mobileCount = enemy_champs.filter(c=>c.mobile).length;
  const tankCount = enemy_champs.filter(c=>c.tanky).length;
  const mrCount = enemy_champs.filter(c=>c.mr).length;
  const assassinCount = enemy_champs.filter(c=>
    ['Zed','Talon','Katarina','Akali','LeBlanc','Qiyana','Khazix','Nocturne','Naafiri'].includes(champId(c.n)) ||
    (c.mobile && c.dmg==='ad' && !c.tanky)
  ).length;
  const midChamp = CHAMP_DB.find(c=>c.n===draft.mid);
  const midIsAssassinAD = midChamp && midChamp.dmg==='ad' && midChamp.mobile && !midChamp.tanky;
  const midIsAssassinAP = midChamp && midChamp.dmg==='ap' && midChamp.mobile && !midChamp.tanky;

  // Build engine
  let build, boots, sixth, strat, runeReco;
  if(currentChamp==='Veigar'){
    boots = (enemy_champs.filter(c=>c.n==='Cassiopeia'||c.n==='Nasus').length>=1) ? "Boots of Swiftness" : "Ionian Boots";
    const hasManyTanks = tankCount>=2;
    const hasManyMobile = mobileCount>=3;
    const hasManyMR = mrCount>=2 || (tankCount>=2 && adCount<=1);
    let core1, core2, core3;
    if(hasManyMobile){
      core1 = "Fimbulwinter"; core2 = "Rabadon's Deathcap"; core3 = "Cryptbloom";
    } else if(hasManyTanks){
      core1 = "Blackfire Torch"; core2 = "Rabadon's Deathcap"; core3 = "Cryptbloom";
    } else {
      core1 = "Rod of Ages"; core2 = "Seraph's Embrace"; core3 = "Cryptbloom";
    }
    if(hasManyMR) core3 = "Void Staff";
    sixth = midIsAssassinAD ? "Zhonya's Hourglass" : midIsAssassinAP ? "Banshee's Veil" : adCount>=3 ? "Frozen Heart" : "Zhonya's Hourglass";
    build = [
      {n:"Tear of the Goddess",reason:"Rush Tear pour mana infinie et préparer Seraph's/Fimbulwinter.",tags:['Mana','Rush']},
      {n:boots,reason:boots==="Boots of Swiftness"?"Neutralise les slows adverses.":"Haste compétences pour Q spam et stacking passif.",tags:['Mobilité']},
      {n:core1,reason:core1==="Fimbulwinter"?`Slow sur ${mobileCount} mobiles (${enemies.filter((_,i)=>enemy_champs[i]?.mobile).join(', ')}). Remplace Seraph.`:core1==="Blackfire Torch"?`Dégâts DoT sur ${tankCount} tanks. Passe leur résistances.`:`Mana + HP + AP scaling. Fondation du build standard.`,tags:['Core']},
      {n:core2,reason:`Multiplicateur AP. Ton passif + items = ${hasManyMobile?'one-shot même les mobiles':'scaling infini'}.`,tags:['AP','Multiplicateur']},
      {n:core3,reason:core3==="Void Staff"?`${mrCount} ennemis avec MR. % penetration obligatoire.`:`Penetration magique + healing sur kills. Finisher.`,tags:['Pen']},
      {n:sixth,reason:sixth==="Zhonya's Hourglass"?`Survie vs ${draft.mid} (assassin AD) — active pendant leur combo.`:sixth==="Banshee's Veil"?`Bloque un spell burst de ${draft.mid}.`:sixth==="Frozen Heart"?`-20% AS vs ${adCount} AD. Réduction DPS auto-attackers.`:`Défensif prioritaire dans cette composition.`,tags:['Défense','Situationnel']}
    ];
    strat = mobileCount>=3 ? `Compo très mobile (${mobileCount} mobiles). Joue Fimbulwinter + cage préventive. Priorise targets qui restent fixes.` :
            tankCount>=2 ? `${tankCount} tanks ennemis. Blackfire Torch + Void Staff pour percer. Cible les squishy d'abord.` :
            apCount>=3 ? `${apCount} AP ennemis. Banshee's en priorité. Joue safe derrière ta cage.` :
            `Compo équilibrée. Build standard optimal. Abuse ton scaling avec ${adCount} AD et ${apCount} AP à burster.`;
    runeReco = `${assassinCount>=2?'Bone Plating obligatoire.':apCount>=3?'Shard MR au lieu d\'AP.':'Aery + Biscuit standard optimal.'}`;
  } else {
    // Syndra — logique build correcte
    boots = "Sorcerer's Shoes";

    // Build DPS/Contrôle : SEULEMENT si 2+ vrais tanks (tanky=true dans la DB)
    // Pas parce qu'il y a beaucoup d'AP — ça n'a rien à voir avec le build Syndra
    const hasManyTanks = tankCount >= 2;
    // AP dans la compo adverse = Banshee's en défensif, PAS Blackfire Torch
    // Blackfire = réponse aux tanks, pas aux mages
    const manyAP = apCount >= 3; // sert uniquement pour le 6ème item défensif

    let core1, core2, core3, buildType;
    if(hasManyTanks){
      // Build DPS : tanks ennemis → DoT + CDR
      buildType = 'dps';
      core1 = "Blackfire Torch";
      core2 = "Cosmic Drive";
      core3 = mrCount >= 2 ? "Void Staff" : "Rabadon's Deathcap";
    } else {
      // Build Burst : compo standard/squishy → one-shot
      buildType = 'burst';
      core1 = "Luden's Companion";
      core2 = "Shadowflame";
      core3 = mrCount >= 2 ? "Void Staff" : "Rabadon's Deathcap";
    }

    // 6ème item : défense adaptée à la menace principale
    if(midIsAssassinAD) {
      sixth = "Zhonya's Hourglass";
    } else if(midIsAssassinAP || manyAP) {
      sixth = "Banshee's Veil";
    } else if(mrCount >= 2) {
      sixth = "Void Staff";
    } else {
      sixth = "Zhonya's Hourglass"; // défault safe
    }

    // Raison build core1
    const core1Reason = buildType === 'dps'
      ? `${tankCount} tanks ennemis (${enemy_champs.filter(c=>c.tanky).map(c=>c.n).join(', ')}). Blackfire DoT passe leur HP massive.`
      : `Compo squishy — poke + mana + burst immédiat niv 6. Pas de tanks à percer.`;

    // Raison core2
    const core2Reason = buildType === 'dps'
      ? `CDR + mouvement pour enchaîner les stuns et rester mobile en teamfight.`
      : `Flat pen maximale vs ${enemy_champs.filter(c=>!c.tanky).map(c=>c.n).slice(0,2).join(', ')||'squishies'}. One-shot activé.`;

    // Raison core3
    const core3Reason = core3 === "Void Staff"
      ? `${mrCount} ennemis avec MR (${enemy_champs.filter(c=>c.mr).map(c=>c.n).join(', ')}). % pen obligatoire.`
      : `Multiplicateur AP — transforme ton AP en dégâts exponentiels en mid-game.`;

    build = [
      {n:core1,reason:core1Reason,tags:['Core','Rush']},
      {n:boots,reason:"Flat magic pen dès le début. Meilleure paire de boots sur Syndra systématiquement.",tags:['Mobilité','Pen']},
      {n:core2,reason:core2Reason,tags:['Core']},
      {n:core3,reason:core3Reason,tags:['AP']},
      {n:"Zhonya's Hourglass",reason:"Survie pendant le CD de ton E (ta seule défense). Active quand tu es focus.",tags:['Défense']},
      {n:sixth,reason:sixth==="Banshee's Veil"?`${manyAP?apCount+' AP ennemis':'Assassin AP mid'} — bouclier pour absorber un burst.`:sixth==="Void Staff"?`Percer la MR restante en late.`:`6ème item adaptatif — change selon comment la partie se déroule.`,tags:['Flexible']}
    ];

    strat = hasManyTanks
      ? `${tankCount} tanks adverses. Build DPS (Blackfire+Cosmic) pour percer. Spam stuns en teamfight, focus frontline puis backline via R+E.`
      : mobileCount >= 3
        ? `${mobileCount} mobiles. Garde ton E pour te défendre (ta seule esquive). R+E en teamfight pour zone de stun impossible à esquiver.`
        : manyAP
          ? `${apCount} AP ennemis. Banshee's en 6ème obligatoire. Build Burst actif — cherche le flanc sur les squishies.`
          : `Compo favorable pour Syndra. Build Burst — cherche le kill niv 6-7 avec 40 stacks (2 charges Q). Tu dois te sortir de lane seule.`;

    runeReco = midIsAssassinAD || midIsAssassinAP
      ? 'Bone Plating (Resolve 2ème arbre) + Zhonya\'s rush en early.'
      : mobileCount >= 3
        ? 'Arcane Comet si tu peux pas approcher, sinon Aery.'
        : adCount <= 1 && apCount <= 1
          ? 'Aery vs melee court range (Darius, Garen). Spam Q libre.'
          : 'Aery standard optimal. Arcane Comet si long range dominant.';
  }

  // Render
  const buildHtml = build.map((item,i)=>`
    <div class="build-order-item">
      <div class="build-num">${i+1}</div>
      <img class="build-item-img" src="${iImg(item.n)}" alt="${item.n}" onerror="this.style.display='none'" loading="lazy">
      <div class="build-item-info">
        <div class="build-item-name">${item.n}</div>
        <div class="build-item-reason">${item.reason}</div>
        <div class="build-tags">${item.tags.map(t=>`<span class="build-tag">${t}</span>`).join('')}</div>
      </div>
    </div>
  `).join('');

  const buildString = build.map(b=>b.n).join(' → ');

  el.innerHTML = `
    <div class="sec-title">ANALYSE DE COMPOSITION</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">
      <span class="stat-chip ad">⚔️ ${adCount} AD</span>
      <span class="stat-chip ap">✨ ${apCount} AP</span>
      <span class="stat-chip mobile">⚡ ${mobileCount} Mobiles</span>
      <span class="stat-chip tank">🛡 ${tankCount} Tanks</span>
      <span class="stat-chip assassin">🗡 ${assassinCount} Assassins</span>
      <span class="stat-chip mr">💫 ${mrCount} MR</span>
    </div>
    <div class="card mt-16">
      <div class="card-title">BUILD ORDER</div>
      ${buildHtml}
      <div style="margin-top:12px;display:flex;gap:8px">
        <button class="btn" onclick="copyBuild('${buildString}')">📋 Copier le build</button>
      </div>
    </div>
    <div class="grid-2 mt-16">
      <div class="card">
        <div class="card-title">STRATÉGIE</div>
        <p style="font-size:14px;color:var(--text-mid);line-height:1.6">${strat}</p>
      </div>
      <div class="card">
        <div class="card-title">RUNES RECOMMANDÉES</div>
        <p style="font-size:14px;color:var(--text-mid);line-height:1.6">${runeReco}</p>
      </div>
    </div>
  `;
}

function copyBuild(str){
  try{ navigator.clipboard.writeText(str); }catch(e){}
  const btn = document.querySelector('.btn[onclick*="copyBuild"]');
  if(btn){ btn.textContent='✅ Copié !'; setTimeout(()=>btn.textContent='📋 Copier le build',2000); }
}

function setMatchupFilter(filter, el){
  matchupFilter = filter;
  document.querySelectorAll('#matchup-filters .filter-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  filterMatchups();
}

function filterMatchups(){
  renderMatchups(document.getElementById('matchup-search').value.toLowerCase());
}

function renderMatchups(search=''){
  const data = MATCHUPS[currentChamp] || [];
  const filtered = data.filter(m=>{
    const nameMatch = m.n.toLowerCase().includes(search);
    const tierMatch = matchupFilter==='all' || m.t===matchupFilter;
    return nameMatch && tierMatch;
  });
  const sorted = [...filtered].sort((a,b)=>{
    const order={extreme:0,hard:1,even:2,easy:3};
    return order[a.t]-order[b.t];
  });
  const grid = document.getElementById('matchup-grid');
  grid.innerHTML = sorted.map(m=>`
    <div class="matchup-card" onclick="showMatchupDetail('${m.n.replace(/'/g,"\\'")}')">
      <img src="${champImg(m.n)}" alt="${m.n}" onerror="this.style.display='none'" loading="lazy">
      <div class="matchup-card-name">${m.n}</div>
      <div>
        <span class="threat-badge badge-${m.t}">${m.t.toUpperCase()}</span>
      </div>
    </div>
  `).join('');
  if(!sorted.length) grid.innerHTML = '<p style="color:var(--text-dim);padding:20px">Aucun matchup trouvé.</p>';
}

function showMatchupDetail(name){
  const data = MATCHUPS[currentChamp] || [];
  const m = data.find(x=>x.n===name);
  if(!m) return;
  const width = {extreme:'95%',hard:'70%',even:'50%',easy:'30%'}[m.t];
  const el = document.getElementById('matchup-detail');
  el.innerHTML = `
    <div class="card">
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:16px">
        <img src="${champImg(m.n)}" style="width:56px;height:56px;border-radius:50%;border:3px solid var(--accent)" onerror="this.style.display='none'" loading="lazy">
        <div>
          <div style="font-family:Orbitron;font-size:18px;font-weight:700">${m.n}</div>
          <span class="threat-badge badge-${m.t}">${m.t.toUpperCase()}</span>
        </div>
      </div>
      <div class="threat-bar-wrap" style="margin-bottom:16px;height:8px">
        <div class="threat-fill ${m.t}" style="width:${width}"></div>
      </div>
      ${m.tips.map(tip=>`
        <div class="flashcard">
          <div class="flashcard-badge ${tip.b}">${tip.l}</div>
          <div class="flashcard-text">${tip.t}</div>
        </div>
      `).join('')}
    </div>
  `;
}

// ================================================================
//  CALCULATOR
// ================================================================
function renderCalc(){
  const data = CALC[currentChamp];
  const spells = SPELLS[currentChamp];
  const el = document.getElementById('calc-content');
  const inputsHtml = data.inputs.map(inp=>{
    if(inp.type==='checkbox'){
      return `<div style="margin-bottom:12px">
        <label class="calc-label" style="display:flex;align-items:center;gap:10px;cursor:pointer">
          <input type="checkbox" id="calc_${inp.id}" ${inp.def?'checked':''} onchange="updateCalc()" style="width:18px;height:18px;accent-color:var(--accent)">
          ${inp.label}
        </label>
      </div>`;
    }
    return `<div style="margin-bottom:12px">
      <label class="calc-label" for="calc_${inp.id}">${inp.label} <span id="calc_${inp.id}_val" style="color:var(--accent);font-family:'JetBrains Mono',monospace">${inp.def}</span></label>
      <input type="range" id="calc_${inp.id}" min="${inp.min}" max="${inp.max}" step="${inp.step}" value="${inp.def}"
        class="calc-input" style="height:4px;padding:0;cursor:pointer"
        oninput="document.getElementById('calc_${inp.id}_val').textContent=this.value;updateCalc()">
    </div>`;
  }).join('');

  el.innerHTML = `
    <div class="sec-title">CALCULATEUR — ${currentChamp.toUpperCase()}</div>
    <div class="grid-2">
      <div class="card">
        <div class="card-title">PARAMÈTRES</div>
        ${inputsHtml}
      </div>
      <div class="card">
        <div class="card-title">RÉSULTATS</div>
        <div id="calc-results"></div>
      </div>
    </div>
  `;
  // Restore calc values
  try{
    const saved = JSON.parse(localStorage.getItem('tac_calc_'+currentChamp));
    if(saved){
      data.inputs.forEach(inp=>{
        const el2 = document.getElementById('calc_'+inp.id);
        if(el2 && saved[inp.id]!==undefined){
          el2.value = saved[inp.id];
          const valEl = document.getElementById('calc_'+inp.id+'_val');
          if(valEl) valEl.textContent = saved[inp.id];
          if(inp.type==='checkbox') el2.checked = saved[inp.id];
        }
      });
    }
  }catch(e){}
  updateCalc();
}

function updateCalc(){
  const data = CALC[currentChamp];
  const spells = SPELLS[currentChamp];
  const v = {};
  const toSave = {};
  data.inputs.forEach(inp=>{
    const el = document.getElementById('calc_'+inp.id);
    if(!el) return;
    if(inp.type==='checkbox'){ v[inp.id]=el.checked; toSave[inp.id]=el.checked; }
    else { v[inp.id]=Number(el.value); toSave[inp.id]=el.value; }
  });
  try{ localStorage.setItem('tac_calc_'+currentChamp, JSON.stringify(toSave)); }catch(e){}
  const res = data.calc(v);
  const el = document.getElementById('calc-results');
  if(!el) return;

  const rows = currentChamp==='Veigar' ? [
    {key:'totalAP',label:'AP Total',spell:null,icon:null},
    {key:'Q',label:'Dégâts Q',spell:'Q',icon:spells.Q},
    {key:'W',label:'Dégâts W',spell:'W',icon:spells.W},
    {key:'E',label:'Dégâts E',spell:'E',icon:spells.E},
    {key:'Rmin',label:'R minimum',spell:'R',icon:spells.R},
    {key:'Rmax',label:'R maximum (full stacks)',spell:'R',icon:spells.R},
    {key:'combo',label:'Combo Q+W+R',spell:null,icon:null}
  ] : [
    {key:'totalAP',label:'AP Total',spell:null,icon:null},
    {key:'Q',label:'Dégâts Q',spell:'Q',icon:spells.Q},
    {key:'W',label:'Dégâts W',spell:'W',icon:spells.W},
    {key:'E',label:'Dégâts E (base)',spell:'E',icon:spells.E},
    {key:'R',label:`Dégâts R (${res.spheres||5} sphères)`,spell:'R',icon:spells.R},
    {key:'combo',label:'Combo Q+W+R',spell:null,icon:null}
  ];

  el.innerHTML = rows.map(r=>`
    <div class="calc-result-row">
      ${r.icon ? `<img src="${spellImg(r.icon)}" style="width:28px;height:28px;border-radius:6px;flex-shrink:0" onerror="this.style.display='none'" loading="lazy">` : '<div style="width:28px"></div>'}
      <span class="calc-label-sm">${r.label}</span>
      <span class="calc-dmg">${res[r.key]?.toLocaleString('fr-FR') ?? '—'}</span>
    </div>
  `).join('');
}

  if(currentChamp==='Syndra'){

      <div class="card mt-16">
        <div class="card-title">PHASE DE JEU</div>
        <div class="flashcard">
          <div class="flashcard-badge badge-red">1</div>
          <div class="flashcard-text"><strong>Early (niv 1-7) :</strong> FAIBLE. Farm, accumule les stacks, évite les ganks. Petits trades Q+E mais ne force pas.</div>
        </div>
        <div class="flashcard">
          <div class="flashcard-badge badge-gold">2</div>
          <div class="flashcard-text"><strong>Mid-game (niv 7-8+) :</strong> Transformation à 40 stacks (2 charges Q). Énorme burst, solo kill possible. Mix mage/assassin — crée du jeu seule.</div>
        </div>
        <div class="flashcard">
          <div class="flashcard-badge badge-purple">3</div>
          <div class="flashcard-text"><strong>Teamfight :</strong> Positionnement en bush avant objectifs. Cherche flancs sur squishies. R+E pour stun frontline → backline. Sois TRÈS PATIENT avec E.</div>
        </div>
        <div class="flashcard">
          <div class="flashcard-badge badge-cyan">💡</div>
          <div class="flashcard-text"><strong>Tips :</strong> Toujours remettre un Q avant R (plus de sphères). Les flèches sur les sphères indiquent la direction du E. Le E/W passent mieux à travers les murs.</div>
        </div>
      </div>`;
  }
}
